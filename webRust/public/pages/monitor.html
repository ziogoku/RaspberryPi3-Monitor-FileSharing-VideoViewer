<div class="container">
    <div class="card cpu-card">
        <div class="card-header">
            <span class="card-title">CPU Temperature</span>
        </div>
        <div id="cpu-temp" class="card-value">--°C</div>
        <div class="card-subvalue">Carico attuale: <span id="cpu-load">--%</span></div>
    </div>

    <div class="card ram-card">
        <div class="card-header">
            <span class="card-title">RAM Usage</span>
        </div>
        <div id="ram-usage-percent" class="card-value">--%</div>
        <div class="card-subvalue"><span id="ram-used">-- MB</span> / <span id="ram-total">-- MB</span></div>
    </div>

    <div class="card disk-card">
        <div class="card-header">
            <span class="card-title">Disk (Root)</span>
        </div>
        <div id="disk-usage-percent" class="card-value">--%</div>
        <div class="card-subvalue"><span id="disk-used">-- GB</span> / <span id="disk-total">-- GB</span> occupati</div>
    </div>
</div>
